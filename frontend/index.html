<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Grading Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🎨 Art Grading Agent</h1>
    <p class="subtitle">Submit your artwork for evaluation by the world's most opinionated robot teacher.</p>
  </header>

  <main>
    <!-- Upload section -->
    <section class="card" id="upload-section">
      <h2>Upload Artwork</h2>
      <div class="drop-area" id="drop-area">
        <p>Drag &amp; drop an image here, or</p>
        <label class="btn" for="file-input">Choose File</label>
        <input type="file" id="file-input" accept="image/*" hidden />
      </div>
      <div id="preview-container" class="hidden">
        <img id="preview-img" src="" alt="Preview" />
      </div>
      <button class="btn primary" id="grade-btn" disabled>Grade My Art</button>
    </section>

    <!-- Result section -->
    <section class="card hidden" id="result-section">
      <h2>Verdict</h2>
      <div class="grade-display">
        <span id="grade-value">--</span>
        <span class="grade-label">/ 100</span>
      </div>
      <p id="explanation" class="explanation"></p>
      <div id="labels-container">
        <h3>Detected Objects</h3>
        <ul id="labels-list"></ul>
      </div>
      <button class="btn" id="reset-btn">Grade Another</button>
    </section>

    <!-- Loading indicator -->
    <div class="hidden" id="loading">
      <div class="spinner"></div>
      <p>The teacher is judging your work…</p>
    </div>

    <!-- Error display -->
    <div class="hidden card error-card" id="error-section">
      <p id="error-message"></p>
    </div>
  </main>

  <footer>
    <p>MIS 285N — Generative AI Final Project | March 2026</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
